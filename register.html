<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Конфорка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Source Sans Pro', sans-serif; }
        .font-display { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: #6C37AF; }
        .form-section { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .input-field { border: 2px solid #E5E7EB; border-radius: 12px; transition: all 0.3s; }
        .input-field:focus { border-color: #6C37AF; box-shadow: 0 0 0 3px rgba(108, 55, 175, 0.1); }
        .btn-primary { background: #6C37AF; border-radius: 12px; transition: all 0.3s; }
        .btn-primary:hover { background: #5A2D96; transform: translateY(-2px); }
        .btn-secondary { background: #9CA3AF; border-radius: 12px; transition: all 0.3s; }
        .btn-secondary:hover { background: #6B7280; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="gradient-bg text-white py-8">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex items-center justify-center mb-4">
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mr-4">
                    <img src="Логотип.svg" alt="Конфорка" class="w-8 h-8">
                </div>
                <h1 class="font-display font-bold text-3xl">Конфорка</h1>
            </div>
            <p class="text-lg opacity-90">для тех, кто горит идеей • серая обложка, яркие дела</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <form id="register-form" class="form-section p-8 space-y-8">
            <!-- Основная информация -->
            <div>
                <h2 class="font-display font-semibold text-2xl mb-6" style="color: #6C37AF;">Основная информация</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Имя *</label>
                        <input name="first_name" required class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Фамилия *</label>
                        <input name="last_name" required class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                        <input name="email" type="email" required class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Пароль *</label>
                        <input name="password" type="password" required class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Тип пользователя *</label>
                        <select name="user_type" required class="w-full input-field px-4 py-3">
                            <option value="">Выберите тип</option>
                            <option value="researcher">Исследователь</option>
                            <option value="mentor">Ментор</option>
                            <option value="equipment_provider">Поставщик оборудования</option>
                            <option value="enterprise">Предприятие</option>
                            <option value="student">Студент</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Город/регион</label>
                        <input name="location" class="w-full input-field px-4 py-3" />
                    </div>
                </div>
            </div>

            <!-- Профессиональная информация -->
            <div>
                <h2 class="font-display font-semibold text-2xl mb-6" style="color: #6C37AF;">Профессиональная информация</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Навыки (через запятую)</label>
                        <input name="skills" placeholder="Python, Machine Learning, Электроника" class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Опыт работы (лет)</label>
                        <input name="experience_years" type="number" min="0" class="w-full input-field px-4 py-3" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">О себе</label>
                        <textarea name="bio" rows="3" class="w-full input-field px-4 py-3" placeholder="Расскажите о своих интересах и опыте..."></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Социальные сети (через запятую)</label>
                        <input name="social_links" placeholder="LinkedIn, GitHub, личный сайт" class="w-full input-field px-4 py-3" />
                    </div>
                </div>
            </div>

            <!-- Дополнительная информация -->
            <div>
                <h2 class="font-display font-semibold text-2xl mb-6" style="color: #6C37AF;">Дополнительная информация</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Языки (через запятую)</label>
                        <input name="languages" placeholder="Русский, English, Deutsch" class="w-full input-field px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Сертификаты (через запятую)</label>
                        <input name="certifications" placeholder="AWS Certified, PMP" class="w-full input-field px-4 py-3" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Мотивация участия в проектах</label>
                        <textarea name="motivation" rows="3" class="w-full input-field px-4 py-3" placeholder="Почему вы хотите участвовать в проектах на платформе?"></textarea>
                    </div>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="flex items-center justify-between pt-6">
                <a href="index.html" class="text-gray-600 hover:text-gray-800">
                    <i class="fas fa-arrow-left mr-2"></i>Назад к главной
                </a>
                <button type="submit" class="btn-primary text-white px-8 py-3 font-semibold">
                    <i class="fas fa-user-plus mr-2"></i>Зарегистрироваться
                </button>
            </div>
        </form>

        <div id="notice" class="hidden mt-4 text-sm"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';


        function parseList(value) {
            if (!value) return [];
            return value.split(',').map(s => s.trim()).filter(Boolean);
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;

            const data = {
                first_name: form.first_name.value,
                last_name: form.last_name.value,
                email: form.email.value,
                password: form.password.value,
                user_type: form.user_type.value,
                bio: form.bio.value || null,
                skills: parseList(form.skills.value),
                experience_years: form.experience_years.value ? parseInt(form.experience_years.value) : 0,
                social_links: parseList(form.social_links.value),
                location: form.location.value || null,
                languages: parseList(form.languages.value),
                certifications: parseList(form.certifications.value),
                motivation: form.motivation.value || null
            };

            const notice = document.getElementById('notice');
            notice.className = 'mt-4 text-sm text-gray-700';
            notice.textContent = 'Регистрация...';

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Ошибка регистрации');
                }
                
                const result = await res.json();
                notice.className = 'mt-4 text-sm text-green-700';
                notice.textContent = 'Регистрация успешна! Перенаправление...';
                
                // Сохраняем токен и перенаправляем
                localStorage.setItem('konforka_token', 'demo_token');
                setTimeout(() => { window.location.href = 'projects.html'; }, 1500);
                
            } catch (err) {
                notice.className = 'mt-4 text-sm text-red-700';
                notice.textContent = err.message;
            }
        });
    </script>
</body>
</html>
